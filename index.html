// Sostituisce window.storage con implementazione Supabase

const SUPA_URL = 'https://njwtfmiviijszzxschll.supabase.co';

  'Content-Type': 'application/json'

window.storage = {
  get: async function(key) {
    try {
      const resp = await fetch(
        SUPA_URL + '/rest/v1/app_kv?key=eq.' + encodeURIComponent(key) + '&select=key,value',
        { headers: _supaHeaders }
      );
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      return data.length > 0 ? { key: key, value: data[0].value } : null;
    } catch (e) {
      // Fallback a localStorage se offline
      try {
        const v = localStorage.getItem('tnb__' + key);
        return v ? { key: key, value: v } : null;
      } catch (_) { return null; }
    }
  },
  set: async function(key, value) {
    try {
      // Scrivi su Supabase
      const resp = await fetch(SUPA_URL + '/rest/v1/app_kv', {
        method: 'POST',
        headers: Object.assign({}, _supaHeaders, { 'Prefer': 'resolution=merge-duplicates' }),
        body: JSON.stringify({ key: key, value: value, updated_at: new Date().toISOString() })

      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      // Cache locale per accesso offline
      try { localStorage.setItem('tnb__' + key, value); } catch (_) {}
      return { key: key, value: value };
    } catch (e) {
      // Fallback a localStorage se offline
      try {
        localStorage.setItem('tnb__' + key, value);
        return { key: key, value: value };
      } catch (_) { return null; }
    }
  },
  delete: async function(key) {
    try {
      await fetch(
        SUPA_URL + '/rest/v1/app_kv?key=eq.' + encodeURIComponent(key),
        { method: 'DELETE', headers: _supaHeaders }
      );
      try { localStorage.removeItem('tnb__' + key); } catch (_) {}
      return { key: key, deleted: true };
    } catch (e) {
      try { localStorage.removeItem('tnb__' + key); } catch (_) {}
      return { key: key, deleted: false };
    }
  },
  list: async function(prefix) {
    try {
      const url = prefix

        : SUPA_URL + '/rest/v1/app_kv?select=key';

    } catch (e) {
      return { keys: [], prefix: prefix };
    }
  }

// Movimento magazzino: aggiorna stati giacenza
const applicaMovimento = (mag, magId, tipo, qta) => {
  return mag.map(m => {
    if (m.id !== magId) return m;
    const g = {
      ...(m.giacenza || {})
    };
    const q = Number(qta) || 0;
    switch (tipo) {
      case "carico":
        g.disponibile = (g.disponibile || 0) + q;
        break;
      case "imbottigliamento_ok":
        g.disponibile = (g.disponibile || 0) + q;
        g.in_imbottigliamento = Math.max(0, (g.in_imbottigliamento || 0) - q);
        break;
      case "etichettatura_ok":
        g.disponibile = (g.disponibile || 0) + q;
        g.da_etichettare = Math.max(0, (g.da_etichettare || 0) - q);
        break;
      case "preparazione_ok":
        g.disponibile = (g.disponibile || 0) + q;
        g.in_preparazione = Math.max(0, (g.in_preparazione || 0) - q);
        break;
      case "riserva":
        g.riservato = (g.riservato || 0) + q;
        g.disponibile = Math.max(0, (g.disponibile || 0) - q);
        break;
      case "riserva_annullata":
        g.disponibile = (g.disponibile || 0) + q;
        g.riservato = Math.max(0, (g.riservato || 0) - q);
        break;
      case "affido_spedizioniere":
        g.in_transito = (g.in_transito || 0) + q;
        g.riservato = Math.max(0, (g.riservato || 0) - q);
        g.in_preparazione = Math.max(0, (g.in_preparazione || 0) - q);
        break;
      case "consegnato":
        g.in_transito = Math.max(0, (g.in_transito || 0) - q);
        break;
      case "scarico_manuale":
        g.disponibile = Math.max(0, (g.disponibile || 0) - q);
        break;
      default:
        break;
    }
    return {
      ...m,
      giacenza: g
    };
  });
};
const totOrdine = ord => (ord.righe || []).reduce((s, r) => s + (r.qta || 0) * (r.prezzoUnitario || 0), 0);

// Costo olio per litro calcolato da config
const costoOlioPerLitro = cfg => {
  const cOlive = cfg.costoOlivePerKg * (100 / cfg.resaMedia);
  const cFr = cfg.costoFrangituraPer100kg / cfg.resaMedia;
  return cOlive + cFr;
};
const costoFormato = (formato, cfg) => {
  const ml = formato === "100 ml" ? 0.1 : formato === "250 ml" ? 0.25 : formato === "500 ml" ? 0.5 : (formato === "20 ml" || formato === "Olio 20 ml" || formato === "Aceto 20 ml") ? 0.02 : formato === "3 L (latta)" ? 3 : 5;
  const cOlio = costoOlioPerLitro(cfg) * ml;
  const v = cfg.voci[formato] || {
    bottiglia: 1,
    etichetta: 0.2,
    packaging: 0.3,
    logistica: 0.3
  };
  return cOlio + v.bottiglia + v.etichetta + v.packaging + v.logistica;
};
